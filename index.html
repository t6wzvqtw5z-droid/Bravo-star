<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💩 ВЫДАВИ КАКАШКУ! 💩</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: #1a3a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Press Start 2P', cursive, monospace;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #f5e6b0;
            border-radius: 60px 60px 50px 50px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
            padding: 20px 16px 30px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            background: #6b4c2c;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            color: #ffefb9;
            margin: 0 0 15px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .poop-main {
            background: #2c2412;
            border-radius: 50px;
            padding: 15px;
            margin: 10px 0;
        }
        .poop-number {
            font-size: 3.8rem;
            font-weight: bold;
            background: #fff0c0;
            display: inline-block;
            padding: 8px 35px;
            border-radius: 60px;
            color: #5a2e00;
            font-family: monospace;
            word-break: break-word;
        }
        .poop-emoji {
            font-size: 5.5rem;
            cursor: pointer;
            transition: 0.05s linear;
            display: inline-block;
            margin: 10px 0;
            filter: drop-shadow(4px 8px 0 rgba(0,0,0,0.2));
        }
        .poop-emoji:active {
            transform: scale(0.87);
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            background: #e9d7a3;
            border-radius: 48px;
            padding: 12px;
            margin: 15px 0;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .stat {
            background: #fff2cf;
            padding: 6px 12px;
            border-radius: 30px;
            flex: 1;
            text-align: center;
        }
        .boost-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .boost-card {
            background: #ffbe76;
            flex: 1;
            border-radius: 50px;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #b4621a;
            transition: 0.05s linear;
        }
        .boost-card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b4621a;
        }
        .shop-item {
            background: #c9a87b;
            margin: 12px 0;
            padding: 10px 16px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .buy-btn {
            background: #4f7a2c;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-area {
            background: #4a3922;
            border-radius: 40px;
            margin-top: 20px;
            padding: 12px;
            color: #f9e4b7;
        }
        .leaderboard {
            background: #fff2db;
            border-radius: 40px;
            margin-top: 18px;
            padding: 10px;
            text-align: left;
        }
        .leader-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .leader-list {
            max-height: 170px;
            overflow-y: auto;
        }
        .leader-entry {
            display: flex;
            justify-content: space-between;
            background: #ffe6b3;
            margin: 5px 0;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        input {
            padding: 8px;
            border-radius: 30px;
            border: none;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .timer-info {
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💩 ВЫДАВИ КАКАШКУ! 💩</h1>
    
    <div class="poop-main">
        <div class="poop-number" id="poopDisplay">💩 0</div>
    </div>
    
    <div class="poop-emoji" id="clickPoop">🕊️</div>
    
    <div class="stats-row">
        <div class="stat">💩 Кликов <span id="statClicks">0</span></div>
        <div class="stat">🕊️ За клик <span id="statPerClick">1</span></div>
        <div class="stat">⏱️ Авто <span id="statAuto">0.0</span></div>
        <div class="stat">🕒 Время <span id="timer">0м 0с</span></div>
    </div>
    
    <div class="boost-buttons">
        <div class="boost-card" id="boostX5">⚡ БУСТ x5 <span style="font-size:12px;">(10💩)</span></div>
        <div class="boost-card" id="rainbowBoost">🌈 РАДУГА x5 <span style="font-size:12px;">(20💩)</span></div>
    </div>
    
    <div class="shop-item">
        <span>🚽 Расстройство (+1💩/клик)</span>
        <button class="buy-btn" data-upgrade="click">💩 10000</button>
    </div>
    <div class="shop-item">
        <span>🤖 Авто-кликер (+0.5💩/сек)</span>
        <button class="buy-btn" data-upgrade="auto">💩 15000</button>
    </div>
    <div class="shop-item">
        <span>🔐 Пароль от админки</span>
        <button class="buy-btn" data-upgrade="adminPass">💩 10000000</button>
    </div>
    
    <!-- АДМИН ПАНЕЛЬ (пароль Артем202) -->
    <div class="admin-area">
        <div id="adminLoginZone">
            <div style="display:flex; gap:8px;">
                <input type="text" id="adminPwdInput" placeholder="пароль админа">
                <button id="adminLoginButton" style="border-radius:30px; background:#f3c26b;">Войти</button>
            </div>
            <div style="font-size:11px;">🔒 админ-панель</div>
        </div>
        <div id="adminTools" class="hidden">
            <button id="resetLeaderBtn" style="background:#a5662a;">♻️ Сброс лидеров</button>
            <button id="addTestLeaderBtn" style="background:#5f8b3a;">➕ Тест-лидер</button>
            <div style="font-size:10px;">*Пароль: Артем202</div>
        </div>
    </div>
    
    <!-- ДОСКА ЛИДЕРОВ ПО КАКАШКАМ -->
    <div class="leaderboard">
        <div class="leader-title">🏆 ДОСКА ЛИДЕРОВ (КАКАШКИ) 🏆</div>
        <div id="leaderboardList" class="leader-list">загрузка...</div>
    </div>
</div>

<script>
    // ---------- ИГРА ----------
    let poop = 0;
    let totalClicks = 0;
    let clickPower = 1;
    let autoPower = 0;
    let rainbowActive = false;     // радуга x5 (умножает клик на 5 временно на 30 сек)
    let rainbowEndTime = 0;
    let rainbowInterval = null;
    
    // админ
    const ADMIN_PASS = "Артем202";
    let adminLogged = false;
    
    // лидеры
    let leaderboard = [];
    let playerName = null;
    
    // DOM
    const poopDisplay = document.getElementById("poopDisplay");
    const statClicks = document.getElementById("statClicks");
    const statPerClick = document.getElementById("statPerClick");
    const statAuto = document.getElementById("statAuto");
    const timerSpan = document.getElementById("timer");
    const clickPoop = document.getElementById("clickPoop");
    const boostX5 = document.getElementById("boostX5");
    const rainbowBoostBtn = document.getElementById("rainbowBoost");
    const adminLoginZone = document.getElementById("adminLoginZone");
    const adminTools = document.getElementById("adminTools");
    const adminPwdInput = document.getElementById("adminPwdInput");
    const adminLoginButton = document.getElementById("adminLoginButton");
    const resetLeaderBtn = document.getElementById("resetLeaderBtn");
    const addTestLeaderBtn = document.getElementById("addTestLeaderBtn");
    const leaderboardListDiv = document.getElementById("leaderboardList");
    
    // время сессии
    let startTime = Date.now();
    let timerIntervalId;
    
    // авто-кликер
    let autoIntervalId = null;
    
    function updateUI() {
        poopDisplay.innerText = "💩 " + Math.floor(poop);
        statClicks.innerText = totalClicks;
        let displayClickPower = clickPower;
        if (rainbowActive && Date.now() < rainbowEndTime) displayClickPower = clickPower * 5;
        statPerClick.innerText = displayClickPower;
        statAuto.innerText = autoPower.toFixed(1);
    }
    
    function addPoop(amount) {
        poop += amount;
        if (poop < 0) poop = 0;
        updateUI();
        saveGame();
        updateLeaderboardForPlayer();
    }
    
    function handleClick() {
        let gain = clickPower;
        if (rainbowActive && Date.now() < rainbowEndTime) {
            gain = clickPower * 5;
        }
        addPoop(gain);
        totalClicks++;
        updateUI();
        // анимация
        const emoji = document.querySelector(".poop-emoji");
        emoji.style.transform = "scale(0.85)";
        setTimeout(() => emoji.style.transform = "", 100);
    }
    
    // буст x5 (стоит 10)
    function boostNormal() {
        let cost = 10;
        if (poop >= cost) {
            poop -= cost;
            let bonus = clickPower * 5;
            addPoop(bonus);
            updateUI();
        } else {
            boostX5.style.opacity = "0.6";
            setTimeout(() => boostX5.style.opacity = "1", 200);
        }
    }
    
    // радуга x5 на 30 секунд (стоит 20)
    function activateRainbow() {
        let cost = 20;
        if (poop >= cost) {
            poop -= cost;
            if (rainbowInterval) clearInterval(rainbowInterval);
            rainbowActive = true;
            rainbowEndTime = Date.now() + 30000;
            updateUI();
            // таймер визуально
            rainbowInterval = setInterval(() => {
                if (Date.now() >= rainbowEndTime) {
                    rainbowActive = false;
                    clearInterval(rainbowInterval);
                    rainbowInterval = null;
                    updateUI();
                } else {
                    let remain = Math.ceil((rainbowEndTime - Date.now()) / 1000);
                    rainbowBoostBtn.innerText = `🌈 РАДУГА x5 (${remain}с)`;
                }
            }, 200);
            rainbowBoostBtn.innerText = "🌈 РАДУГА АКТИВНА!";
            setTimeout(() => {
                if (!rainbowActive) rainbowBoostBtn.innerText = "🌈 РАДУГА x5 (20💩)";
                else rainbowBoostBtn.innerText = "🌈 x5 АКТИВНО";
            }, 1500);
        } else {
            rainbowBoostBtn.style.opacity = "0.6";
            setTimeout(() => rainbowBoostBtn.style.opacity = "1", 200);
        }
    }
    
    // покупки
    function buyUpgrade(type) {
        if (type === "click") {
            if (poop >= 10000) {
                poop -= 10000;
                clickPower += 1;
                updateUI();
                saveGame();
                return true;
            }
        } else if (type === "auto") {
            if (poop >= 15000) {
                poop -= 15000;
                autoPower += 0.5;
                updateUI();
                restartAutoInterval();
                saveGame();
                return true;
            }
        } else if (type === "adminPass") {
            if (poop >= 10000000) {
                poop -= 10000000;
                updateUI();
                alert("🔑 Пароль от админ-панели: " + ADMIN_PASS);
                saveGame();
                return true;
            }
        }
        return false;
    }
    
    function restartAutoInterval() {
        if (autoIntervalId) clearInterval(autoIntervalId);
        if (autoPower > 0) {
            autoIntervalId = setInterval(() => {
                addPoop(autoPower);
            }, 1000);
        }
    }
    
    // ----- ЛИДЕРЫ -----
    function getPlayerName() {
        let saved = localStorage.getItem("poopPlayerName");
        if (saved) return saved;
        let defaultName = "Игрок" + Math.floor(Math.random() * 1000);
        let name = prompt("👤 Введите имя для доски лидеров:", defaultName);
        if (!name) name = "Аноним💩";
        name = name.slice(0, 14);
        localStorage.setItem("poopPlayerName", name);
        return name;
    }
    
    function loadLeaderboard() {
        let stored = localStorage.getItem("poopLeaderboard");
        if (stored) {
            leaderboard = JSON.parse(stored);
        } else {
            leaderboard = [
                { name: "Артём", poop: 179999999999999 },
                { name: "КакашныйКороль", poop: 4200000 },
                { name: "ТурбоСтул", poop: 892000 }
            ];
        }
        renderLeaderboard();
    }
    
    function saveLeaderboard() {
        localStorage.setItem("poopLeaderboard", JSON.stringify(leaderboard));
    }
    
    function renderLeaderboard() {
        if (!leaderboardListDiv) return;
        let sorted = [...leaderboard].sort((a,b) => b.poop - a.poop).slice(0, 10);
        if (sorted.length === 0) {
            leaderboardListDiv.innerHTML = "<div>нет записей</div>";
            return;
        }
        let html = "";
        sorted.forEach((entry, idx) => {
            let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : `${idx+1}`;
            html += `<div class="leader-entry"><span>${medal} ${entry.name}</span><span>💩 ${entry.poop.toLocaleString()}</span></div>`;
        });
        leaderboardListDiv.innerHTML = html;
    }
    
    function updateLeaderboardForPlayer() {
        if (!playerName) return;
        let existing = leaderboard.find(l => l.name === playerName);
        if (existing) {
            existing.poop = Math.floor(poop);
        } else {
            leaderboard.push({ name: playerName, poop: Math.floor(poop) });
        }
        leaderboard.sort((a,b) => b.poop - a.poop);
        if (leaderboard.length > 20) leaderboard = leaderboard.slice(0,20);
        saveLeaderboard();
        renderLeaderboard();
    }
    
    // АДМИН ФУНКЦИИ
    function adminLogin() {
        let pwd = adminPwdInput.value;
        if (pwd === ADMIN_PASS) {
            adminLogged = true;
            adminLoginZone.classList.add("hidden");
            adminTools.classList.remove("hidden");
        } else {
            alert("Неверный пароль!");
        }
    }
    
    function adminResetLeaderboard() {
        if (!adminLogged) return;
        leaderboard = [];
        if (playerName) leaderboard.push({ name: playerName, poop: Math.floor(poop) });
        saveLeaderboard();
        renderLeaderboard();
    }
    
    function adminAddFakeLeader() {
        if (!adminLogged) return;
        let fake = { name: "Тест#" + Math.floor(Math.random()*999), poop: Math.floor(Math.random()*5000000) };
        leaderboard.push(fake);
        leaderboard.sort((a,b) => b.poop - a.poop);
        if (leaderboard.length > 20) leaderboard = leaderboard.slice(0,20);
        saveLeaderboard();
        renderLeaderboard();
    }
    
    // СОХРАНЕНИЕ ИГРЫ
    function saveGame() {
        let save = {
            poop: poop,
            totalClicks: totalClicks,
            clickPower: clickPower,
            autoPower: autoPower,
            playerName: playerName
        };
        localStorage.setItem("poopSaveGame", JSON.stringify(save));
    }
    
    function loadGame() {
        let saved = localStorage.getItem("poopSaveGame");
        if (saved) {
            let data = JSON.parse(saved);
            poop = data.poop || 0;
            totalClicks = data.totalClicks || 0;
            clickPower = data.clickPower || 1;
            autoPower = data.autoPower || 0;
            if (data.playerName) playerName = data.playerName;
            updateUI();
            restartAutoInterval();
        }
    }
    
    // таймер
    function updateTimer() {
        let sec = Math.floor((Date.now() - startTime) / 1000);
        let mins = Math.floor(sec / 60);
        let secs = sec % 60;
        timerSpan.innerText = `${mins}м ${secs}с`;
    }
    
    // инициализация
    function init() {
        playerName = getPlayerName();
        loadGame();
        loadLeaderboard();
        updateUI();
        updateTimer();
        timerIntervalId = setInterval(updateTimer, 1000);
        restartAutoInterval();
        
        clickPoop.addEventListener("click", handleClick);
        boostX5.addEventListener("click", boostNormal);
        rainbowBoostBtn.addEventListener("click", activateRainbow);
        
        document.querySelectorAll(".buy-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let type = btn.getAttribute("data-upgrade");
                let success = buyUpgrade(type);
                if (!success) {
                    btn.style.backgroundColor = "#a13a2a";
                    setTimeout(() => btn.style.backgroundColor = "#4f7a2c", 200);
                } else {
                    btn.style.transform = "scale(0.95)";
                    setTimeout(() => btn.style.transform = "", 100);
                }
                updateUI();
            });
        });
        
        adminLoginButton.addEventListener("click", adminLogin);
        resetLeaderBtn.addEventListener("click", adminResetLeaderboard);
        addTestLeaderBtn.addEventListener("click", adminAddFakeLeader);
    }
    
    init();
</script>
</body>
</html>
